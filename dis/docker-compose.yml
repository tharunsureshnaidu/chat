services:
  redis:
    image: redis:7-alpine
    container_name: dis-redis
    #ports:
     # - "6379:6379"
    volumes:
      - redis_data:/data
    # Raise maxclients so the pool (20 conns × N replicas) + subscribers fit easily.
    command: >
      redis-server
      --maxclients 10000
      --tcp-backlog 511
      --timeout 0
      --tcp-keepalive 300
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: dis-kafka
    #ports:
     # - "9092:9092"
    environment:
      # KRaft — no Zookeeper needed
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:29093"

      # External clients (cargo run on host) use PLAINTEXT://localhost:9092
      # Internal KRaft consensus uses CONTROLLER://localhost:29093
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Required for single-broker setup
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # Skip the 3-second rebalance delay on startup
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      # Auto-create topics on first use with 12 partitions so multiple consumer
      # instances can process messages in parallel without repartitioning later.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1

      # Retain messages for 7 days
      KAFKA_LOG_RETENTION_HOURS: 168

    volumes:
      - kafka_data:/var/lib/kafka/data

    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
  backend:
    build: .
    container_name: dis-backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped
  frontend:
    build:
      context: ..
      dockerfile: discord-app/discord-web/Dockerfile
    container_name: dis-frontend
    ports:
      - "3001:3000"
    restart: unless-stopped
volumes:
  redis_data:
    driver: local
  kafka_data:
    driver: local
